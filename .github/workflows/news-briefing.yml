name: Tax Tech 경쟁사 뉴스 브리핑

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 09:00 KST (= 00:00 UTC)
    - cron: "0 6 * * *"   # 매일 15:00 KST (= 06:00 UTC)
  workflow_dispatch:       # 수동 실행 (테스트용)

jobs:
  briefing:
    name: 뉴스 수집 및 Slack 발송
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: competitor-news-briefing/requirements.txt

      - name: 의존성 설치
        run: pip install -r competitor-news-briefing/requirements.txt

      - name: 뉴스 브리핑 실행
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python competitor-news-briefing/news_briefing.py

      - name: 실패 시 Slack 오류 알림
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text": "⚠️ *Tax Tech 뉴스 브리핑 봇 오류* — GitHub Actions 실행 실패. 로그를 확인하세요."}'
